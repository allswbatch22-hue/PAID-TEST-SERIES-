<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563eb;
padding:20px;
color:white;
font-size:24px;
font-weight:700;
}

.container{
padding:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.input,
.select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.add-btn{
background:#10b981;
}

.test-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.active{
background:#10b981;
}

.inactive{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

</style>

<script type="module">

import { db } from "./firebase/firebase-config.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.loadExams = async()=>{

const select =
document.getElementById("exam");

select.innerHTML =
'<option value="">Select Exam</option>';

const snap =
await getDocs(
collection(db,"exams")
);

snap.forEach(item=>{

const data=item.data();

select.innerHTML += `
<option value="${data.examName}">
${data.examName}
</option>
`;

});

}

window.addTest = async()=>{

const exam =
document.getElementById("exam").value;

const title =
document.getElementById("title").value;

const type =
document.getElementById("type").value;

const pdf =
document.getElementById("pdf").value;

const solutionPdf =
document.getElementById("solutionPdf").value;

if(!exam || !title){

alert("Fill Required Fields");
return;

}

await addDoc(
collection(db,"tests"),
{
exam:exam,
title:title,
type:type,
pdf:pdf,
solutionPdf:solutionPdf,
status:"active",
createdAt:new Date()
}
);

document.getElementById("title").value="";
document.getElementById("pdf").value="";
document.getElementById("solutionPdf").value="";

loadTests();

}

window.loadTests = async()=>{

const snap =
await getDocs(
collection(db,"tests")
);

let html="";

snap.forEach(item=>{

const data=item.data();

html += `

<div class="test-card">

<h2>${data.title}</h2>

<p><b>Exam:</b> ${data.exam}</p>

<p><b>Type:</b> ${data.type}</p>

<p><b>Status:</b> ${data.status}</p>

<p><b>PDF:</b> ${data.pdf || "Not Added"}</p>

<p><b>Solution:</b> ${data.solutionPdf || "Not Added"}</p>

<div class="actions">

<button
class="btn active"
onclick="activateTest('${item.id}')">
Activate
</button>

<button
class="btn inactive"
onclick="deactivateTest('${item.id}')">
Deactivate
</button>

<button
class="btn delete"
onclick="deleteTest('${item.id}')">
Delete
</button>

</div>

</div>

`;

});

document.getElementById("testList")
.innerHTML = html;

}

window.activateTest = async(id)=>{

await updateDoc(
doc(db,"tests",id),
{
status:"active"
}
);

loadTests();

}

window.deactivateTest = async(id)=>{

await updateDoc(
doc(db,"tests",id),
{
status:"inactive"
}
);

loadTests();

}

window.deleteTest = async(id)=>{

if(!confirm("Delete Test ?")) return;

await deleteDoc(
doc(db,"tests",id)
);

loadTests();

}

window.onload = async()=>{

await loadExams();
await loadTests();

}

</script>

</head>

<body>

<div class="header">
Test Management
</div>

<div class="container">

<div class="form-box">

<select
id="exam"
class="select">
<option>
Loading Exams...
</option>
</select>

<input
type="text"
id="title"
class="input"
placeholder="Test Title">

<select
id="type"
class="select">

<option value="free">
Free Test
</option>

<option value="paid">
Paid Test
</option>

</select>

<input
type="text"
id="pdf"
class="input"
placeholder="PDF URL">

<input
type="text"
id="solutionPdf"
class="input"
placeholder="Solution PDF URL">

<button
class="btn add-btn"
onclick="addTest()">
Add Test
</button>

</div>

<div id="testList">

</div>

</div>

</body>
</html>
