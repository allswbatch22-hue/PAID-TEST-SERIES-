<!DOCTYPE html>
<html>
<head>
<title>Apply Buy Code</title>

<style>

body{

background:#f1f5f9;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#2563eb;

border-radius:10px;

}

</style>

</head>

<body>

<div class="card">

<h2>Apply Buy Code</h2>

<br>

<input
type="text"
id="buyCode"

<button
onclick="applyBuyCode()">

Unlock Exam

</button>

</div>

<script type="module">

import {
applyBuyCode
}
from "./buy-code-system.js";

window.applyBuyCode=
applyBuyCode;

</script>

</body>
</html>
