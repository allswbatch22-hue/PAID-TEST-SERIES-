<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Code Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563eb;
padding:20px;
color:white;
font-size:24px;
font-weight:700;
}

.container{
padding:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.input,
.select{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.generate{
background:#10b981;
}

.active{
background:#10b981;
}

.inactive{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

.code-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
margin-right:5px;
}

.used{
background:#ef4444;
}

.unused{
background:#10b981;
}

</style>

<script type="module">

import { db } from "./firebase/firebase-config.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.loadExams = async()=>{

const examSelect =
document.getElementById("exam");

examSelect.innerHTML =
'<option value="">Select Exam</option>';

const snap =
await getDocs(
collection(db,"exams")
);

snap.forEach(item=>{

const data=item.data();

examSelect.innerHTML += `
<option value="${data.examName}">
${data.examName}
</option>
`;

});

}

function generateCode(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let result="";

for(let i=0;i<12;i++){

result += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

return result;

}

window.createCode = async()=>{

const exam =
document.getElementById("exam").value;

const type =
document.getElementById("type").value;

if(!exam){

alert("Select Exam");
return;

}

const code = generateCode();

await addDoc(
collection(db,"buycodes"),
{
code:code,
exam:exam,
type:type,
used:false,
status:"active",
createdAt:new Date()
}
);

loadCodes();

}

window.loadCodes = async()=>{

const snap =
await getDocs(
collection(db,"buycodes")
);

let html="";

snap.forEach(item=>{

const data=item.data();

html += `

<div class="code-card">

<h2>${data.code}</h2>

<p><b>Exam:</b> ${data.exam}</p>

<p><b>Type:</b> ${data.type}</p>

<p><b>Status:</b> ${data.status}</p>

<p>

<span class="badge ${
data.used ? "used" : "unused"
}">
${data.used ? "USED" : "UNUSED"}
</span>

</p>

<div class="actions">

<button
class="btn active"
onclick="activateCode('${item.id}')">
Activate
</button>

<button
class="btn inactive"
onclick="deactivateCode('${item.id}')">
Deactivate
</button>

<button
class="btn delete"
onclick="deleteCode('${item.id}')">
Delete
</button>

</div>

</div>

`;

});

document.getElementById("codeList")
.innerHTML = html;

}

window.activateCode = async(id)=>{

await updateDoc(
doc(db,"buycodes",id),
{
status:"active"
}
);

loadCodes();

}

window.deactivateCode = async(id)=>{

await updateDoc(
doc(db,"buycodes",id),
{
status:"inactive"
}
);

loadCodes();

}

window.deleteCode = async(id)=>{

if(!confirm("Delete Buy Code ?"))
return;

await deleteDoc(
doc(db,"buycodes",id)
);

loadCodes();

}

window.onload = async()=>{

await loadExams();
await loadCodes();

}

</script>

</head>

<body>

<div class="header">
Buy Code Management
</div>

<div class="container">

<div class="form-box">

<select
id="exam"
class="select">
<option>
Loading Exams...
</option>
</select>

<select
id="type"
class="select">

<option value="single">
Single Use Code
</option>

<option value="multi">
Multi Use Code
</option>

</select>

<button
class="btn generate"
onclick="createCode()">
Generate Buy Code
</button>

</div>

<div id="codeList">

</div>

</div>

</body>
</html>
