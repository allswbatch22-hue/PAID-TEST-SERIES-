<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Notes</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
background:#f1f5f9;
font-family:Segoe UI,sans-serif;
}

.header{
background:linear-gradient(135deg,#8b5cf6,#7c3aed);
padding:20px;
color:white;
font-size:24px;
font-weight:700;
}

.grid{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.btn{
display:block;
background:#8b5cf6;
color:white;
padding:12px;
border-radius:10px;
text-decoration:none;
margin-top:10px;
}

</style>

</head>
<body>

<div class="header">
Free Notes PDF
</div>

<div class="grid">

<div class="card">
<h3>Reasoning Notes</h3>
<a href="#" class="btn">Download PDF</a>
</div>

<div class="card">
<h3>Math Notes</h3>
<a href="#" class="btn">Download PDF</a>
</div>

<div class="card">
<h3>GK Notes</h3>
<a href="#" class="btn">Download PDF</a>
</div>

<div class="card">
<h3>Science Notes</h3>
<a href="#" class="btn">Download PDF</a>
</div>

</div>

</body>
</html>
