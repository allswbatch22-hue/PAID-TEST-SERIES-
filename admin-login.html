<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
}

.admin-card{
width:95%;
max-width:450px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.admin-card h1{
text-align:center;
margin-bottom:20px;
}

.admin-card input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

.admin-card button{
width:100%;
padding:14px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="admin-card">

<h1>Admin Login</h1>

<input
type="text"
id="adminId"
placeholder="Admin ID">

<input
type="password"
id="adminPassword"
placeholder="Password">

<button onclick="adminLogin()">
Login
</button>

</div>

<script>

function adminLogin(){

const id =
document.getElementById("adminId").value;

const pass =
document.getElementById("adminPassword").value;

if(
id==="admin" &&
pass==="admin123"
){

localStorage.setItem(
"adminLogin",
"true"
);

window.location.href=
"admin-dashboard.html";

}else{

alert("Invalid Admin Login");

}

}

</script>

</body>
</html>
