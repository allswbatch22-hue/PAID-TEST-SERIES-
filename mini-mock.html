<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Mock</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
background:#f8fafc;
font-family:Segoe UI,sans-serif;
}

.header{
background:linear-gradient(135deg,#f59e0b,#ea580c);
padding:20px;
color:white;
font-size:24px;
font-weight:700;
}

.grid{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.btn{
display:block;
background:#f59e0b;
color:white;
padding:12px;
border-radius:10px;
text-decoration:none;
margin-top:10px;
}

</style>

</head>
<body>

<div class="header">
Mini Mock Tests
</div>

<div class="grid">

<div class="card">
<h3>Mini Mock 01</h3>
<a href="#" class="btn">Start Mock</a>
</div>

<div class="card">
<h3>Mini Mock 02</h3>
<a href="#" class="btn">Start Mock</a>
</div>

<div class="card">
<h3>Mini Mock 03</h3>
<a href="#" class="btn">Start Mock</a>
</div>

<div class="card">
<h3>Mini Mock 04</h3>
<a href="#" class="btn">Start Mock</a>
</div>

</div>

</body>
</html>
