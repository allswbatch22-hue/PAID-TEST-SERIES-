<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563eb;
padding:20px;
color:white;
font-size:24px;
font-weight:700;
}

.container{
padding:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.add-btn{
background:#10b981;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

.action{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.edit{
background:#2563eb;
}

.delete{
background:#ef4444;
}

.active{
background:#10b981;
}

.inactive{
background:#f59e0b;
}

</style>

<script type="module">

import { db } from "./firebase/firebase-config.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.addCoaching = async()=>{

const name =
document.getElementById("name").value;

const banner =
document.getElementById("banner").value;

if(!name){
alert("Enter Coaching Name");
return;
}

await addDoc(
collection(db,"coaching"),
{
name:name,
banner:banner,
status:"active",
createdAt:new Date()
}
);

document.getElementById("name").value="";
document.getElementById("banner").value="";

loadCoaching();

}

window.loadCoaching = async()=>{

const snap =
await getDocs(
collection(db,"coaching")
);

let html="";

snap.forEach(item=>{

const data=item.data();

html += `

<div class="card">

<h2>${data.name}</h2>

<p>Status : ${data.status}</p>

<img src="${data.banner || 'https://via.placeholder.com/800x250'}">

<div class="action">

<button
class="btn active"
onclick="activateCoaching('${item.id}')">
Activate
</button>

<button
class="btn inactive"
onclick="deactivateCoaching('${item.id}')">
Deactivate
</button>

<button
class="btn delete"
onclick="deleteCoaching('${item.id}')">
Delete
</button>

</div>

</div>

`;

});

document.getElementById("coachingList").innerHTML=html;

}

window.activateCoaching = async(id)=>{

await updateDoc(
doc(db,"coaching",id),
{
status:"active"
}
);

loadCoaching();

}

window.deactivateCoaching = async(id)=>{

await updateDoc(
doc(db,"coaching",id),
{
status:"inactive"
}
);

loadCoaching();

}

window.deleteCoaching = async(id)=>{

if(!confirm("Delete Coaching?")) return;

await deleteDoc(
doc(db,"coaching",id)
);

loadCoaching();

}

window.onload=loadCoaching;

</script>

</head>

<body>

<div class="header">
Coaching Management
</div>

<div class="container">

<div class="form-box">

<input
type="text"
id="name"
class="input"
placeholder="Coaching Name">

<input
type="text"
id="banner"
class="input"
placeholder="Banner Image URL">

<button
class="btn add-btn"
onclick="addCoaching()">
Add Coaching
</button>

</div>

<div id="coachingList">

</div>

</div>

</body>
</html>
