<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBT Test Engine</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f1f5f9;
}

.header{
height:70px;
background:#1e3a8a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
font-weight:bold;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.left{
flex:1;
padding:20px;
overflow:auto;
}

.right{
width:300px;
background:white;
border-left:1px solid #ddd;
padding:15px;
overflow:auto;
}

.question-no{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.question{
font-size:20px;
line-height:30px;
margin-bottom:20px;
}

.option{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
border:2px solid #ddd;
cursor:pointer;
}

.option:hover{
border-color:#2563eb;
}

.option.selected{
background:#2563eb;
color:white;
}

.controls{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:bold;
}

.prev{
background:#64748b;
}

.next{
background:#2563eb;
}

.review{
background:#f59e0b;
}

.submit{
background:#dc2626;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.palette-btn{
height:45px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
background:#cbd5e1;
}

.current{
background:#3b82f6 !important;
color:white;
}

.answered{
background:#10b981 !important;
color:white;
}

.reviewed{
background:#f59e0b !important;
color:white;
}

.timer{
font-size:22px;
font-weight:bold;
}

@media(max-width:768px){

.container{
flex-direction:column;
}

.right{
width:100%;
height:250px;
}

}

</style>
</head>

<body>

<div class="header">

<div>
Student : Demo User
</div>

<div class="timer" id="timer">
30:00
</div>

</div>

<div class="container">

<div class="left">

<div class="question-no" id="questionNo">
Question 1
</div>

<div class="question" id="questionText">
Loading...
</div>

<div id="optionsContainer">
</div>

<div class="controls">

<button class="btn prev" onclick="previousQuestion()">
Previous
</button>

<button class="btn next" onclick="nextQuestion()">
Save & Next
</button>

<button class="btn review" onclick="markReview()">
Mark Review
</button>

<button class="btn submit" onclick="submitTest()">
Submit
</button>

</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<br>

<div class="palette" id="palette">
</div>

</div>

</div>

<script>

const questions=[

{
question:"भारत की राजधानी क्या है ?",
options:[
"मुंबई",
"दिल्ली",
"चेन्नई",
"कोलकाता"
],
answer:1
},

{
question:"भारत का राष्ट्रीय पशु कौन है ?",
options:[
"हाथी",
"घोड़ा",
"बाघ",
"शेर"
],
answer:2
},

{
question:"राजस्थान की राजधानी क्या है ?",
options:[
"जयपुर",
"सीकर",
"कोटा",
"अजमेर"
],
answer:0
},

{
question:"भारत का राष्ट्रीय पक्षी कौन है ?",
options:[
"तोता",
"मोर",
"कबूतर",
"हंस"
],
answer:1
}

];

let currentQuestion=0;

let answers={};

let reviewQuestions=[];

function loadQuestion(index){

const q=questions[index];

document.getElementById("questionNo").innerHTML=
`Question ${index+1} / ${questions.length}`;

document.getElementById("questionText").innerHTML=
q.question;

let html="";

q.options.forEach((option,i)=>{

html+=`

<div
class="option ${answers[index]===i ? 'selected':''}"
onclick="selectOption(${i})"
>

${option}

</div>

`;

});

document.getElementById("optionsContainer").innerHTML=
html;

updatePalette();

}

function selectOption(optionIndex){

answers[currentQuestion]=optionIndex;

loadQuestion(currentQuestion);

}

function nextQuestion(){

if(currentQuestion<questions.length-1){

currentQuestion++;

loadQuestion(currentQuestion);

}

}

function previousQuestion(){

if(currentQuestion>0){

currentQuestion--;

loadQuestion(currentQuestion);

}

}

function markReview(){

if(!reviewQuestions.includes(currentQuestion)){

reviewQuestions.push(currentQuestion);

}

updatePalette();

alert("Marked For Review");

}

function updatePalette(){

let html="";

questions.forEach((q,index)=>{

let className="";

if(index===currentQuestion){

className="current";

}
else if(reviewQuestions.includes(index)){

className="reviewed";

}
else if(answers[index]!==undefined){

className="answered";

}

html+=`

<button
class="palette-btn ${className}"
onclick="jumpQuestion(${index})"
>

${index+1}

</button>

`;

});

document.getElementById("palette").innerHTML=
html;

}

function jumpQuestion(index){

currentQuestion=index;

loadQuestion(index);

}

function submitTest(){

let correct=0;

questions.forEach((q,index)=>{

if(answers[index]===q.answer){

correct++;

}

});

alert(

`Total Questions : ${questions.length}

Correct : ${correct}

Wrong : ${questions.length-correct}

Score : ${correct}`

);

}

let time=1800;

setInterval(()=>{

time--;

let min=Math.floor(time/60);

let sec=time%60;

document.getElementById("timer").innerHTML=

String(min).padStart(2,"0")
+":"
+
String(sec).padStart(2,"0");

if(time<=0){

submitTest();

}

},1000);

loadQuestion(0);

</script>

</body>
</html>
