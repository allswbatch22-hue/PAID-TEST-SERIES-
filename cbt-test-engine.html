<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real CBT Test Engine</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f1f5f9;
overflow:hidden;
}

.header{
height:70px;
background:#1e3a8a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
font-weight:bold;
}

.logo{
font-size:22px;
}

.timer{
font-size:22px;
}

.main{
display:flex;
height:calc(100vh - 70px);
}

.left{
flex:1;
padding:20px;
background:white;
overflow:auto;
}

.right{
width:320px;
background:#f8fafc;
border-left:1px solid #ddd;
padding:15px;
overflow:auto;
}

.question-number{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.question{
font-size:20px;
line-height:32px;
margin-bottom:20px;
}

.option{
padding:15px;
border:2px solid #cbd5e1;
border-radius:10px;
margin-bottom:12px;
cursor:pointer;
transition:.3s;
}

.option:hover{
border-color:#2563eb;
}

.selected{
background:#2563eb;
border-color:#2563eb;
color:white;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:25px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:white;
}

.prev{
background:#64748b;
}

.next{
background:#2563eb;
}

.review{
background:#f59e0b;
}

.submit{
background:#dc2626;
}

.palette{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.palette-btn{
height:45px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
background:#cbd5e1;
}

.current{
background:#2563eb!important;
color:white;
}

.answered{
background:#16a34a!important;
color:white;
}

.reviewed{
background:#f59e0b!important;
color:white;
}

.loading{
padding:50px;
text-align:center;
font-size:20px;
}

@media(max-width:900px){

.main{
flex-direction:column;
}

.right{
width:100%;
height:250px;
}

}

</style>
</head>

<body>

<div class="header">

<div class="logo">
Premium CBT Engine
</div>

<div class="timer" id="timer">
Loading...
</div>

</div>

<div class="main">

<div class="left">

<div id="loadingBox" class="loading">
Loading Test...
</div>

<div id="examArea" style="display:none;">

<div
class="question-number"
id="questionNumber">
</div>

<div
class="question"
id="questionText">
</div>

<div id="optionsContainer">
</div>

<div class="controls">

<button
class="btn prev"
onclick="previousQuestion()">
Previous
</button>

<button
class="btn next"
onclick="nextQuestion()">
Save & Next
</button>

<button
class="btn review"
onclick="markReview()">
Mark Review
</button>

<button
class="btn submit"
onclick="submitTest()">
Submit
</button>

</div>

</div>

</div>

<div class="right">

<h3>Question Palette</h3>

<br>

<div
class="palette"
id="palette">
</div>

</div>

</div>

<script>

let questions=[];

let currentQuestion=0;

let answers={};

let reviewQuestions=[];

fetch("tests/test1.json")

.then(response=>response.json())

.then(data=>{

questions=data;

document.getElementById(
"loadingBox"
).style.display="none";

document.getElementById(
"examArea"
).style.display="block";

startTimer();

loadQuestion(0);

})

.catch(error=>{

document.getElementById(
"loadingBox"
).innerHTML=
"Test Loading Failed";

console.log(error);

});

function loadQuestion(index){

const q=questions[index];

document.getElementById(
"questionNumber"
).innerHTML=

`Question ${index+1} / ${questions.length}`;

document.getElementById(
"questionText"
).innerHTML=
q.question;

let html="";

q.options.forEach((option,i)=>{

html+=`

<div
class="option ${
answers[index]===i
? "selected"
: ""
}"
onclick="selectOption(${i})">

${option}

</div>

`;

});

document.getElementById(
"optionsContainer"
).innerHTML=
html;

updatePalette();

}

function selectOption(option){

answers[currentQuestion]=option;

loadQuestion(currentQuestion);

}

function nextQuestion(){

if(
currentQuestion <
questions.length-1
){

currentQuestion++;

loadQuestion(currentQuestion);

}

}

function previousQuestion(){

if(currentQuestion>0){

currentQuestion--;

loadQuestion(currentQuestion);

}

}

function markReview(){

if(
!reviewQuestions.includes(
currentQuestion
)
){

reviewQuestions.push(
currentQuestion
);

}

updatePalette();

}

function jumpQuestion(index){

currentQuestion=index;

loadQuestion(index);

}

function updatePalette(){

let html="";

questions.forEach((q,index)=>{

let cls="";

if(index===currentQuestion){

cls="current";

}
else if(
reviewQuestions.includes(index)
){

cls="reviewed";

}
else if(
answers[index]!==undefined
){

cls="answered";

}

html+=`

<button
class="palette-btn ${cls}"
onclick="jumpQuestion(${index})">

${index+1}

</button>

`;

});

document.getElementById(
"palette"
).innerHTML=
html;

}

function startTimer(){

let time=
questions.length*30;

setInterval(()=>{

time--;

const min=
Math.floor(time/60);

const sec=
time%60;

document.getElementById(
"timer"
).innerHTML=

String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

if(time<=0){

submitTest();

}

},1000);

}

function submitTest(){

localStorage.setItem(
"user_answers",
JSON.stringify(answers)
);

localStorage.setItem(
"questions_data",
JSON.stringify(questions)
);

alert(
"REAL CBT PART 2 ME RESULT SYSTEM AAYEGA"
);

}

</script>

</body>
</html>
