<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Result</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f1f5f9;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:25px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
font-size:30px;
margin-bottom:10px;
}

.card p{
font-size:15px;
color:#555;
}

.correct{
border-left:5px solid #16a34a;
}

.wrong{
border-left:5px solid #dc2626;
}

.score{
border-left:5px solid #2563eb;
}

.percent{
border-left:5px solid #f59e0b;
}

.summary{
background:white;
padding:25px;
margin-top:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.summary div{
padding:10px 0;
border-bottom:1px solid #eee;
}

.rank{
font-size:22px;
font-weight:bold;
color:#7c3aed;
}

.pass{
background:#16a34a;
color:white;
padding:15px;
text-align:center;
border-radius:12px;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.fail{
background:#dc2626;
color:white;
padding:15px;
text-align:center;
border-radius:12px;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.btns{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
color:white;
}

.review{
background:#2563eb;
}

.home{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>CBT Test Result</h1>

<p>Detailed Performance Report</p>

</div>

<div class="grid">

<div class="card correct">
<h2 id="correct">0</h2>
<p>Correct</p>
</div>

<div class="card wrong">
<h2 id="wrong">0</h2>
<p>Wrong</p>
</div>

<div class="card score">
<h2 id="score">0</h2>
<p>Score</p>
</div>

<div class="card percent">
<h2 id="percentage">0%</h2>
<p>Percentage</p>
</div>

</div>

<div class="summary">

<div>
<b>Total Questions :</b>
<span id="totalQuestions">0</span>
</div>

<div>
<b>Attempted :</b>
<span id="attempted">0</span>
</div>

<div>
<b>Skipped :</b>
<span id="skipped">0</span>
</div>

<div>
<b>Accuracy :</b>
<span id="accuracy">0</span>%
</div>

<div>
<b>Rank :</b>
<span class="rank" id="rank">
Rank D
</span>
</div>

<div id="statusBox"></div>

</div>

<div class="btns">

<button
class="btn review"
onclick="window.location.href='answer-review.html'">
Answer Review
</button>

<button
class="btn home"
onclick="window.location.href='index.html'">
Dashboard
</button>

</div>

</div>

<script>

const correct =
Number(
localStorage.getItem("result_correct")
) || 0;

const wrong =
Number(
localStorage.getItem("result_wrong")
) || 0;

const score =
Number(
localStorage.getItem("result_score")
) || 0;

const percentage =
Number(
localStorage.getItem("result_percentage")
) || 0;

const attempted =
Number(
localStorage.getItem("result_attempted")
) || 0;

const questions =
JSON.parse(
localStorage.getItem("questions_data")
) || [];

const totalQuestions =
questions.length;

const skipped =
totalQuestions - attempted;

const accuracy =
attempted > 0
?
(
(correct/attempted)*100
).toFixed(2)
:
0;

document.getElementById(
"correct"
).innerHTML=correct;

document.getElementById(
"wrong"
).innerHTML=wrong;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"percentage"
).innerHTML=
percentage+"%";

document.getElementById(
"attempted"
).innerHTML=
attempted;

document.getElementById(
"skipped"
).innerHTML=
skipped;

document.getElementById(
"accuracy"
).innerHTML=
accuracy;

document.getElementById(
"totalQuestions"
).innerHTML=
totalQuestions;

let rank="Rank D";

if(score>=180){

rank="Rank A+";

}
else if(score>=160){

rank="Rank A";

}
else if(score>=140){

rank="Rank B";

}
else if(score>=120){

rank="Rank C";

}

document.getElementById(
"rank"
).innerHTML=rank;

if(percentage>=80){

document.getElementById(
"statusBox"
).innerHTML=
'<div class="pass">PASS</div>';

}else{

document.getElementById(
"statusBox"
).innerHTML=
'<div class="fail">FAIL</div>';

}

</script>

</body>
</html>
