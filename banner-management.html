<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563eb;
color:white;
padding:20px;
font-size:24px;
font-weight:700;
}

.container{
padding:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.input,
.select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
box-sizing:border-box;
}

.btn{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.add-btn{
background:#10b981;
}

.active{
background:#10b981;
}

.inactive{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

.banner-card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.banner-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

</style>

<script type="module">

import { db } from "./firebase/firebase-config.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.addBanner = async()=>{

const title =
document.getElementById("title").value;

const page =
document.getElementById("page").value;

const image =
document.getElementById("image").value;

if(!title || !page || !image){

alert("Fill All Fields");
return;

}

await addDoc(
collection(db,"banners"),
{
title:title,
page:page,
image:image,
status:"active",
createdAt:new Date()
}
);

document.getElementById("title").value="";
document.getElementById("image").value="";

loadBanners();

}

window.loadBanners = async()=>{

const snap =
await getDocs(
collection(db,"banners")
);

let html="";

snap.forEach(item=>{

const data=item.data();

html += `

<div class="banner-card">

<h3>${data.title}</h3>

<p><b>Page:</b> ${data.page}</p>

<p><b>Status:</b> ${data.status}</p>

<img src="${data.image}">

<div class="actions">

<button
class="btn active"
onclick="activateBanner('${item.id}')">
Activate
</button>

<button
class="btn inactive"
onclick="deactivateBanner('${item.id}')">
Deactivate
</button>

<button
class="btn delete"
onclick="deleteBanner('${item.id}')">
Delete
</button>

</div>

</div>

`;

});

document.getElementById("bannerList").innerHTML =
html;

}

window.activateBanner = async(id)=>{

await updateDoc(
doc(db,"banners",id),
{
status:"active"
}
);

loadBanners();

}

window.deactivateBanner = async(id)=>{

await updateDoc(
doc(db,"banners",id),
{
status:"inactive"
}
);

loadBanners();

}

window.deleteBanner = async(id)=>{

if(!confirm("Delete Banner ?"))
return;

await deleteDoc(
doc(db,"banners",id)
);

loadBanners();

}

window.onload=loadBanners;

</script>

</head>

<body>

<div class="header">
Banner Management
</div>

<div class="container">

<div class="form-box">

<input
type="text"
id="title"
class="input"
placeholder="Banner Title">

<select
id="page"
class="select">

<option value="">
Select Page
</option>

<option value="home">
Home Banner
</option>

<option value="coaching">
Coaching Banner
</option>

<option value="exam">
Exam Banner
</option>

<option value="offer">
Offer Banner
</option>

</select>

<input
type="text"
id="image"
class="input"
placeholder="Banner Image URL">

<button
class="btn add-btn"
onclick="addBanner()">
Add Banner
</button>

</div>

<div id="bannerList">

</div>

</div>

</body>
</html>
