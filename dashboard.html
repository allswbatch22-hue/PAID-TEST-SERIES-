<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Test Series Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f5f7fb;
margin:0;
font-family:Segoe UI,sans-serif;
}

.header{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:20px;
}

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.username{
font-size:22px;
font-weight:700;
}

.logout-btn{
background:red;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
}

.banner{
margin:15px;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
}

.section-title{
font-size:24px;
font-weight:700;
padding:15px;
}

.coaching-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.coaching-card{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
text-align:center;
}

.coaching-card:hover{
transform:translateY(-5px);
}

.coaching-card img{
width:70px;
height:70px;
object-fit:contain;
margin-bottom:10px;
}

.coaching-card h3{
margin:0;
color:#1e293b;
}

.notice{
margin:15px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.notice h2{
margin-bottom:10px;
}

.notice ul{
padding-left:20px;
}

</style>

</head>
<body>

<div class="header">

<div class="header-top">

<div class="username" id="username">
Welcome Student
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

</div>

<div class="banner">

<img id="slider"
src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?q=80&w=1200">

</div>

<div class="notice">

<h2>Latest Notices</h2>

<ul>
<li>SSC GD New Mock Added</li>
<li>RRB NTPC Practice Set Available</li>
<li>New Paid Test Series Live</li>
</ul>

</div>

<div class="section-title">
Popular Coaching
</div>

<div class="coaching-grid">

<div class="coaching-card" onclick="openCoaching('Rojgar With Ankit')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<h3>Rojgar With Ankit</h3>
</div>

<div class="coaching-card" onclick="openCoaching('PW')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<h3>PW</h3>
</div>

<div class="coaching-card" onclick="openCoaching('Adda247')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<h3>Adda247</h3>
</div>

<div class="coaching-card" onclick="openCoaching('Careerwill')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<h3>Careerwill</h3>
</div>

</div>

<script>

const name = localStorage.getItem("userName");

if(!name){
window.location.href="login.html";
}

document.getElementById("username").innerHTML =
"Welcome " + name;

function logout(){

localStorage.clear();

window.location.href="login.html";

}

function openCoaching(name){

localStorage.setItem("selectedCoaching",name);

window.location.href="coaching.html";

}

const banners = [

"https://images.unsplash.com/photo-1434030216411-0b793f4b4173?q=80&w=1200",

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200",

"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1200"

];

let current=0;

setInterval(()=>{

current++;

if(current>=banners.length){

current=0;

}

document.getElementById("slider").src=banners[current];

},3000);

</script>

</body>
</html>
